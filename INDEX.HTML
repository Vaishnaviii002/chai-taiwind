<!DOCTYPE html>
<html>
<head>
  <title>Chai CSS Engine</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef1f5;
    }

    .wrap {
      width: 850px;
      margin: 40px auto;
    }

    .heading {
      text-align: center;
      font-size: 24px;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .card {
      margin-bottom: 20px;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      overflow: hidden;
    }
  </style>
</head>

<body>

  <div class="wrap">

    <div class="heading">Chai CSS Engine Demo</div>

    <div class="card chai-p-20 chai-bg-red chai-text-center chai-text-white chai-fw-bold">
      Hello World
    </div>

    <div class="card chai-p-15 chai-mx-20 chai-border-2 chai-rounded-12 chai-text-center chai-text-18">
      Box with border and spacing
    </div>

    <div class="card chai-flex chai-justify-center chai-items-center chai-bg-blue chai-text-white chai-p-20" style="height:120px;">
      Flex Center
    </div>

    <div class="card chai-p-20 chai-bg-green chai-text-white chai-text-center chai-fw-bold">
      Green Section
    </div>

    <div class="card chai-p-10 chai-border-1 chai-text-center chai-text-14 chai-rounded-8 chai-bg-light">
      Small Text Box
    </div>

    <div class="card chai-flex chai-justify-between chai-items-center chai-px-20 chai-bg-gray chai-text-white" style="height:60px;">
      <span>Left</span>
      <span>Right</span>
    </div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {

      var nodes = document.querySelectorAll("*");

      nodes.forEach(function(el) {

        var cls = Array.from(el.classList);

        cls.forEach(function(c) {

          if (c.indexOf("chai-") !== 0) return;

          var str = c.replace("chai-", "");
          var parts = str.split("-");
          var key = parts[0];
          var val = parts[1];

          if (key === "p") {
            if (!isNaN(val)) el.style.padding = val + "px";
          }

          if (key === "px") {
            if (!isNaN(val)) {
              el.style.paddingLeft = val + "px";
              el.style.paddingRight = val + "px";
            }
          }

          if (key === "m") {
            if (!isNaN(val)) el.style.margin = val + "px";
          }

          if (key === "mx") {
            if (!isNaN(val)) {
              el.style.marginLeft = val + "px";
              el.style.marginRight = val + "px";
            }
          }

          if (key === "bg") {
            if (val === "light") {
              el.style.backgroundColor = "#f7f7f7";
            } else {
              el.style.backgroundColor = val;
            }
          }

          if (key === "text") {
            if (val === "center" || val === "left" || val === "right") {
              el.style.textAlign = val;
            } else if (!isNaN(val)) {
              el.style.fontSize = val + "px";
            } else {
              el.style.color = val;
            }
          }

          if (key === "border") {
            var w = val ? val : 1;
            el.style.border = w + "px solid #333";
          }

          if (key === "rounded") {
            if (!isNaN(val)) el.style.borderRadius = val + "px";
          }

          if (key === "flex") {
            el.style.display = "flex";
          }

          if (key === "justify") {
            el.style.display = "flex";
            el.style.justifyContent = val;
          }

          if (key === "items") {
            el.style.display = "flex";
            el.style.alignItems = val;
          }

          if (key === "fw") {
            if (val === "bold") el.style.fontWeight = "bold";
            if (val === "light") el.style.fontWeight = "300";
          }

          if (key === "w") {
            if (!isNaN(val)) el.style.width = val + "px";
          }

          if (key === "h") {
            if (!isNaN(val)) el.style.height = val + "px";
          }

          if (key === "shadow") {
            el.style.boxShadow = "0 4px 12px rgba(0,0,0,0.15)";
          }

          el.classList.remove(c);

        });

      });

    });
  </script>

</body>
</html>
